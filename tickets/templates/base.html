<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ticketing System{% endblock %}</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --sidebar-bg: #1e293b;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--white);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            position: fixed;
            height: 100vh;
        }

        .sidebar h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            padding-left: 0.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 2rem;
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border: 1px border var(--border);
        }

        h2 {
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        /* Utility Buttons */
        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            text-align: left;
            padding: 1rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--primary);
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-low {
            background: #dcfce7;
            color: #166534;
        }

        .badge-medium {
            background: #fef9c3;
            color: #854d0e;
        }

        .badge-high {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="sidebar">
        <h1>TicketFlow</h1>
        <nav style="flex: 1;">
            <a href="{% url 'tickets' %}" class="nav-link">Dashboard</a>
            <a href="{% url 'create_ticket' %}" class="nav-link">New Ticket</a>
        </nav>

        {% if user.is_authenticated %}
        <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem; margin-top: 1rem;">
            <p style="color: #94a3b8; font-size: 0.75rem; margin-bottom: 0.5rem; padding-left: 1rem;">Logged in as:</p>
            <p style="color: white; font-weight: 600; padding-left: 1rem; margin-bottom: 1rem;">{{ user.username }}</p>
            <form action="{% url 'logout' %}" method="post" style="padding-left: 1rem;">
                {% csrf_token %}
                <button type="submit"
                    style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 0.875rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; padding: 0;">
                    Logout &rarr;
                </button>
            </form>
        </div>
        {% else %}
        <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 0.5rem; text-align: center;">
            <a href="{% url 'login' %}" class="btn btn-primary" style="width: 100%; font-size: 0.875rem;">Login</a>
        </div>
        {% endif %}
    </div>

    <div class="main-content">
        <div class="content-card">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>

</html>
