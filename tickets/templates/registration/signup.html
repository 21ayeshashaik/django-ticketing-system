{% extends 'base.html' %}

{% block title %}Sign Up | TicketFlow{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <h1
        style="text-align: center; margin-bottom: 2rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        TicketFlow</h1>
    <div class="content-card" style="padding: 2.5rem;">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Create Account</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div style="color: #ef4444; font-size: 0.75rem; margin-top: 0.25rem;">
                    {{ field.errors }}
                </div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem;">Register</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.875rem;">
            Already have an account? <a href="{% url 'login' %}"
                style="color: var(--primary); text-decoration: none; font-weight: 500;">Login</a>
        </p>
    </div>
</div>
{% endblock %}
