{% extends 'base.html' %}

{% block title %}Login | TicketFlow{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <h1
        style="text-align: center; margin-bottom: 2rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        TicketFlow</h1>
    <div class="content-card" style="padding: 2.5rem;">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.875rem;">
            Don't have an account? <a href="{% url 'signup' %}"
                style="color: var(--primary); text-decoration: none; font-weight: 500;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
